<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IPL 2026 Predictions — MI vs KKR Leaderboard | GECI UAE Alumni</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --gold:#F5A623;--gold-bright:#FFD166;--orange:#E8593C;
    --dark:#0A0E1A;--card:#111827;--card2:#141C2E;
    --border:#1E2A40;--text:#F0EDE6;--muted:#7A8399;
    --silver:#C0C0C0;--bronze:#CD7F32;--green:#7EC8A0;
  }
  html,body{background:var(--dark);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh}
  body{display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}

  .wrap{width:100%;max-width:520px}

  /* Top accent bar */
  .accent-bar{height:4px;background:linear-gradient(90deg,var(--orange),var(--gold),var(--orange));border-radius:2px 2px 0 0}

  /* Header */
  .header{background:var(--card);border:1px solid var(--border);border-top:none;padding:20px 20px 16px;text-align:center}
  .powered{font-size:10px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
  .title{font-family:'Rajdhani',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:700;color:var(--gold-bright);letter-spacing:1px;line-height:1.1}
  .match-badge{display:inline-flex;align-items:center;gap:10px;margin-top:10px;background:#1A2235;border:1px solid var(--border);border-radius:20px;padding:6px 18px;font-size:13px;font-weight:600}
  .mi{color:#00B4D8}.kkr{color:#9B59B6}.vs{color:var(--orange);font-size:16px}
  .sub{color:var(--muted);font-size:11px;letter-spacing:1px}

  /* Podium */
  .podium{display:flex;justify-content:center;align-items:flex-end;gap:10px;padding:20px 12px 10px;background:linear-gradient(180deg,#0D1220,var(--dark))}
  .p-card{flex:1;max-width:140px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;text-align:center;transition:transform .2s}
  .p-card:hover{transform:translateY(-3px)}
  .p1{border-color:var(--gold)!important;box-shadow:0 4px 20px rgba(245,166,35,.18);max-width:155px;margin-bottom:0!important}
  .p2{margin-bottom:14px}
  .p3{margin-bottom:14px}
  .p-top{padding:14px 8px 10px}
  .p-medal{font-size:26px;display:block;margin-bottom:4px}
  .p-rank{display:inline-flex;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-bottom:6px}
  .p1 .p-rank{background:var(--gold);color:#1A1200}
  .p2 .p-rank{background:var(--silver);color:#0A0A0A}
  .p3 .p-rank{background:var(--bronze);color:#1A0A00}
  .p-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.2}
  .p-batch{font-size:11px;color:var(--muted);margin-top:3px}
  .p-pts-bar{padding:8px;border-top:1px solid var(--border)}
  .pts-num{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;line-height:1}
  .p1 .pts-num{color:var(--gold-bright)}
  .p2 .pts-num{color:var(--silver)}
  .p3 .pts-num{color:var(--bronze)}
  .pts-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

  /* Divider */
  .divider{display:flex;align-items:center;gap:10px;padding:0 16px 10px}
  .div-line{flex:1;height:1px;background:var(--border)}
  .div-txt{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}

  /* Table */
  .lb-table{width:100%;border-collapse:collapse;padding:0 12px;display:block}
  .lb-table tr{border-bottom:1px solid var(--border);transition:background .15s}
  .lb-table tr:last-child{border-bottom:none}
  .lb-table tr:hover td{background:rgba(255,255,255,.03)}
  .lb-table td{padding:8px 6px;vertical-align:middle}
  .rank-c{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--muted);width:28px;text-align:center}
  .name-c{font-size:13px;color:var(--text);font-weight:500}
  .batch-c{font-size:11px;color:var(--muted);width:40px;text-align:center}
  .bar-c{width:70px;padding:0 4px}
  .bar-bg{background:#1A2235;border-radius:4px;height:6px;overflow:hidden}
  .bar-fill{height:6px;border-radius:4px;background:linear-gradient(90deg,var(--orange),var(--gold));transition:width .6s ease}
  .pts-c{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;width:32px;text-align:right}
  .pts-hi{color:var(--gold)}.pts-md{color:var(--green)}.pts-lo{color:var(--muted)}

  /* Stats footer */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px 12px 0}
  .stat{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
  .stat-val{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--gold);display:block}
  .stat-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

  /* Footer note */
  .footer-note{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;letter-spacing:.5px}

  /* Animations */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .wrap{animation:fadeUp .5s ease both}
  .p-card{animation:fadeUp .5s ease both}
  .p-card:nth-child(1){animation-delay:.1s}
  .p-card:nth-child(2){animation-delay:.2s}
  .p-card:nth-child(3){animation-delay:.3s}

  @media(max-width:420px){
    .p-name{font-size:12px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .bar-c{display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="accent-bar"></div>
  <div class="header">
    <div class="powered">Powered by · GECI UAE Alumni</div>
    <div class="title">🏏 IPL 2026 PREDICTIONS</div>
    <div class="match-badge">
      <span class="mi">MI</span>
      <span class="vs">⚡</span>
      <span class="kkr">KKR</span>
      <span class="sub">LEADERBOARD</span>
    </div>
  </div>

  <div class="podium" id="podium"></div>

  <div class="divider">
    <div class="div-line"></div>
    <div class="div-txt">Rankings</div>
    <div class="div-line"></div>
  </div>

  <table class="lb-table"><tbody id="lb-body"></tbody></table>

  <div class="stats" id="stats"></div>
  <div class="footer-note">GECI UAE Alumni · IPL 2026 Predictions Competition</div>
</div>

<script>
const players=[
  {name:"Asif Ali T",batch:2019,pts:7},
  {name:"Nikhil Padikkal",batch:2008,pts:7},
  {name:"Shafina",batch:2005,pts:7},
  {name:"Anwar",batch:2008,pts:5},
  {name:"Sakhin",batch:2011,pts:5},
  {name:"Ajmal KA",batch:2004,pts:4},
  {name:"Amal Thankachan",batch:2017,pts:4},
  {name:"Arun Kumar",batch:2014,pts:4},
  {name:"Jashir",batch:2014,pts:4},
  {name:"Jasil",batch:2019,pts:4},
  {name:"Lukeman",batch:2007,pts:4},
  {name:"Shakir",batch:2019,pts:4},
  {name:"Shamna",batch:2004,pts:4},
  {name:"Sooraj Sukumaran",batch:2013,pts:4},
  {name:"Swathy Vinod",batch:2010,pts:4},
  {name:"RAKESH",batch:2019,pts:3},
  {name:"Sumayya",batch:2012,pts:3},
  {name:"VISHNU",batch:2021,pts:3},
  {name:"Aneesh Salimkumat",batch:2009,pts:2},
  {name:"Balagovind",batch:2018,pts:2},
  {name:"Fayiz Hashim",batch:2008,pts:2},
  {name:"Shibil Jaleel",batch:2004,pts:2},
  {name:"Vipin K V",batch:2006,pts:2},
  {name:"ARJUN R G",batch:2022,pts:2},
  {name:"Benax Arjunan",batch:2005,pts:0},
  {name:"Muhammed Fayis",batch:2015,pts:0},
  {name:"Sameer",batch:2006,pts:0},
  {name:"Shahsad",batch:2014,pts:0},
  {name:"Sudheesh Sudhakaran",batch:2008,pts:0},
];
players.sort((a,b)=>b.pts-a.pts||a.name.localeCompare(b.name));
const maxPts=players[0].pts;
const medals=["🥇","🥈","🥉"];

// Podium
const top3=players.slice(0,3);
const order=[{p:top3[1],cls:"p2",rank:2},{p:top3[0],cls:"p1",rank:1},{p:top3[2],cls:"p3",rank:3}];
const podiumEl=document.getElementById("podium");
order.forEach(({p,cls,rank})=>{
  const d=document.createElement("div");
  d.className=`p-card ${cls}`;
  d.innerHTML=`<div class="p-top"><span class="p-medal">${medals[rank-1]}</span><div class="p-rank">${rank}</div><div class="p-name">${p.name}</div><div class="p-batch">Batch ${p.batch}</div></div><div class="p-pts-bar"><div class="pts-num">${p.pts}</div><div class="pts-lbl">Points</div></div>`;
  podiumEl.appendChild(d);
});

// Table
const tbody=document.getElementById("lb-body");
players.slice(3).forEach((p,i)=>{
  const rank=i+4;
  const pct=Math.round(p.pts/maxPts*100);
  const ptsCls=p.pts>=5?"pts-hi":p.pts>=3?"pts-md":"pts-lo";
  const tr=document.createElement("tr");
  tr.innerHTML=`<td class="rank-c">${rank}</td><td class="name-c">${p.name}</td><td class="batch-c">${p.batch}</td><td class="bar-c"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></td><td class="pts-c ${ptsCls}">${p.pts}</td>`;
  tbody.appendChild(tr);
});

// Stats
const avg=(players.reduce((s,p)=>s+p.pts,0)/players.length).toFixed(1);
const zeros=players.filter(p=>p.pts===0).length;
const statsData=[["PARTICIPANTS",players.length],["AVG POINTS",avg],["TOP SCORE",maxPts],["ZERO POINTS",zeros]];
const statsEl=document.getElementById("stats");
statsData.forEach(([lbl,val])=>{
  statsEl.innerHTML+=`<div class="stat"><span class="stat-val">${val}</span><div class="stat-lbl">${lbl}</div></div>`;
});
</script>
</body>
</html>
